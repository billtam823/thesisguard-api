spring:
  application:
    name: thesisguard-api
  config:
    # Local secrets (gitignored). Put openrouter.api-key in application-local.yaml.
    import: optional:file:./application-local.yaml
  datasource:
    url: jdbc:postgresql://localhost:5432/thesisguard
    username: thesisguard_app
    # password lives in application-local.yaml (gitignored); must match docker-compose.yml.
  jpa:
    hibernate:
      ddl-auto: update
    # SQL echo off (set true locally to see generated SQL).
    show-sql: false

logging:
  level:
    com.thesisguard.ai: DEBUG
    com.thesisguard.thesis: DEBUG
    # Quiet Hibernate: no SQL echo, no startup chatter (HHH00... INFO lines). Warnings/errors still show.
    org.hibernate: WARN

management:
  # Health endpoint for Dokploy probes: GET /actuator/health (+ liveness/readiness groups).
  # Only `health` is exposed — no other actuator endpoints are public.
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

openbb:
  # Point this at YOUR OWN self-hosted OpenBB Platform instance. Override base-url (and the
  # api-key) in application-local.yaml (gitignored) so your instance URL stays out of the repo.
  base-url: https://your-openbb-instance.example.com
  # api-key lives in application-local.yaml; must match this client's entry in the server's
  # OPENBB_API_KEYS. Without it, requests are rejected once the server enforces auth.

seekingalpha:
  # Company-news source via RapidAPI (host seeking-alpha-finance.p.rapidapi.com).
  # Put the RapidAPI key in application-local.yaml:
  #   seekingalpha:
  #     api-key: <your rapidapi key>
  # Without a key, company-news fetches return empty (SEC filings/insider still work via OpenBB).
  host: seeking-alpha-finance.p.rapidapi.com

newsfilter:
  base-url: https://api.newsfilter.io
  # Company-news source (newswires + SEC + financial media; ticker-tagged). Put the key in
  # application-local.yaml:
  #   newsfilter:
  #     api-key: <your newsfilter.io key>
  # Without a key, company-news fetches return empty (SEC filings/insider still work via OpenBB,
  # and the AI web-search collector still runs).

finnhub:
  base-url: https://finnhub.io/api/v1
  # Former company-news source, now unwired (replaced by newsfilter.io). FinnhubClient remains in
  # the codebase as a fallback; put a key here + re-wire NewsItemService to use it again.

openrouter:
  # FREE-MODEL config (for the Dokploy demo — $0 LLM cost).
  # Thesis model MUST support structured outputs (json_schema); google/gemini-2.0-flash-exp:free
  # does (Google honors response_format=json_schema). Review/triage only need plain JSON, so any
  # free model works. Free models are rate-limited (~50 req/day on OpenRouter) — fine for a demo.
  # For production, swap back to a paid structured-outputs model (e.g. google/gemini-3.5-flash) —
  # ideally via env vars (OPENROUTER_MODEL, OPENROUTER_REVIEW_MODEL, OPENROUTER_TRIAGE_MODEL) so
  # this file stays demo-ready. Browse current free models at openrouter.ai/models?max_price=0.
  model: google/gemini-2.0-flash-exp:free
  review-model: google/gemini-2.0-flash-exp:free
  # Cheap model for the news triage pre-filter (material vs noise). Defaults to review-model when unset.
  triage-model: google/gemini-2.0-flash-exp:free
  # Model used for the AI web-search news collector (disabled by default, so unused in the demo).
  news-search-model: google/gemini-2.0-flash-exp:free
  # api-key lives in application-local.yaml (gitignored).
  # When api-key is set, OpenRouterAiClient is used. Otherwise MockAiClient is used.

thesisguard:
  # Cheap triage gate: when true, news is classified material/noise before the expensive
  # doctrine review, which only runs on material items. Set false to review every item.
  triage:
    enabled: true
  # AI web-search news collector (OpenRouter web_search tool). Disabled by default now that
  # Seeking Alpha is the company-news source; set enabled=true to also run it (incurs Exa cost).
  ai-news-search:
    enabled: false
    lookback-hours: 24
    max-items: 25
    verify-urls: true
    # Search backend for the web_search tool. "exa" returns url_citation annotations (enables the
    # anti-hallucination guard); "auto" uses provider-native search but may omit citations.
    engine: exa
  # Automatic news fetch (INGEST ONLY -- never runs a review; review stays manual).
  # NOTE: confirm the timezone and the two clock times for your market before relying on these.
  # Empty crons disables auto-fetch (ingest on demand via POST /api/stocks/{code}/news/ingest).
  news-fetch:
    zone: America/New_York
    crons:
      - "0 0 9 * * MON-FRI"    # pre-market fetch (09:00 ET, before the 09:30 open)
      - "0 0 12 * * MON-FRI"   # lunch fetch (12:00 ET)
